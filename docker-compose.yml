version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: silk-beauty-postgres
    environment:
      POSTGRES_USER: silkbeauty
      POSTGRES_PASSWORD: silkbeauty_dev_password
      POSTGRES_DB: silkbeauty
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backups:/backups
      - ./prisma/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U silkbeauty -d silkbeauty"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=768MB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - max_connections=100
      - -c
      - statement_timeout=30000
      - -c
      - log_statement=mod
      - -c
      - log_min_duration_statement=1000
    networks:
      - silkbeauty-network

  pgbouncer:
    image: pgbouncer/pgbouncer:1.22.1
    container_name: silk-beauty-pgbouncer
    environment:
      DATABASES_HOST: postgres
      DATABASES_PORT: 5432
      DATABASES_DATABASE: silkbeauty
      DATABASES_USER: silkbeauty
      DATABASES_PASSWORD: silkbeauty_dev_password
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
      MIN_POOL_SIZE: 5
      RESERVE_POOL_SIZE: 5
      RESERVE_POOL_TIMEOUT: 3
      SERVER_IDLE_TIMEOUT: 600
      SERVER_LIFETIME: 3600
      SERVER_CONNECT_TIMEOUT: 15
      SERVER_LOGIN_RETRY: 15
      CLIENT_IDLE_TIMEOUT: 0
      CLIENT_LOGIN_TIMEOUT: 60
      AUTOCLEAN: 15
      QUERY_TIMEOUT: 0
      QUERY_WAIT_TIMEOUT: 120
      ADMIN_USERS: silkbeauty
    ports:
      - "6432:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - silkbeauty-network

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: silk-beauty-postgres-exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://silkbeauty:silkbeauty_dev_password@postgres:5432/silkbeauty?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - silkbeauty-network

volumes:
  postgres_data:
    driver: local
  postgres_backups:
    driver: local

networks:
  silkbeauty-network:
    driver: bridge
