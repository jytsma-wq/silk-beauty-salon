name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 3 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  NEXT_TELEMETRY_DISABLED: 1
  DATABASE_URL: postgresql://build:build@localhost:5432/build
  DIRECT_DATABASE_URL: postgresql://build:build@localhost:5432/build
  CONTACT_EMAIL: info@silkbeautysalon.online
  SMTP_HOST: smtp.hostinger.com
  SMTP_PORT: '465'
  SMTP_SECURE: 'true'
  SMTP_USER: info@silkbeautysalon.online
  SMTP_PASSWORD: ci-placeholder-password
  SMTP_FROM: Silk Beauty Salon <info@silkbeautysalon.online>
  NEXT_PUBLIC_SITE_URL: https://silkbeautysalon.online

jobs:
  verify:
    name: Validate, Test, and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate translations
        run: npm run validate:i18n

      - name: Run ESLint
        run: npm run lint

      - name: Run TypeScript type check
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test

      - name: Build application
        run: npm run build

      - name: Upload standalone build artifact
        uses: actions/upload-artifact@v4
        with:
          name: silk-beauty-salon-standalone
          path: |
            .next/standalone
            .next/static
            public/apk/silk-beauty-salon.apk
          retention-days: 7

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for verified secrets
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --only-verified

  backup:
    name: Daily database backup
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
      BACKUP_DIR: /tmp/backups
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      BACKUP_S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run database backup
        run: mkdir -p /tmp/backups && npm run db:backup

      - name: Upload backup to S3
        run: aws s3 cp /tmp/backups/ s3://$BACKUP_S3_BUCKET/postgres/$(date +%Y/%m/%d)/ --recursive

      - name: Verify backup
        run: npm run db:backup:verify
        env:
          BACKUP_DIR: /tmp/backups
