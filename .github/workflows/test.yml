name: Test & Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint

      - name: Run TypeScript type check
        run: bun run typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Vitest tests with coverage
        run: bun run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/
          retention-days: 30

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build application
        run: bun run build
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'file:./dev.db' }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 'test-key' }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID || 'test-audience' }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL || 'test@example.com' }}
          API_SECRET_KEY: ${{ secrets.API_SECRET_KEY || 'test-secret' }}

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium firefox webkit

      - name: Build application
        run: bun run build
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'file:./dev.db' }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 'test-key' }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID || 'test-audience' }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL || 'test@example.com' }}
          API_SECRET_KEY: ${{ secrets.API_SECRET_KEY || 'test-secret' }}

      - name: Run Playwright tests
        run: bun run test:e2e
        env:
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  coverage-check:
    name: Coverage Check
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        run: bun run test:coverage

      - name: Check coverage thresholds
        run: |
          # Extract coverage percentages from coverage-summary.json
          COVERAGE=$(cat coverage/coverage-summary.json | jq '.total.statements.pct')
          BRANCHES=$(cat coverage/coverage-summary.json | jq '.total.branches.pct')
          FUNCTIONS=$(cat coverage/coverage-summary.json | jq '.total.functions.pct')
          LINES=$(cat coverage/coverage-summary.json | jq '.total.lines.pct')
          
          echo "Statement coverage: $COVERAGE%"
          echo "Branch coverage: $BRANCHES%"
          echo "Function coverage: $FUNCTIONS%"
          echo "Line coverage: $LINES%"
          
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "Coverage dropped below 80% threshold!"
            exit 1
          fi
          
          if (( $(echo "$BRANCHES < 75" | bc -l) )); then
            echo "Branch coverage dropped below 75% threshold!"
            exit 1
          fi
          
          echo "Coverage check passed!"

  lighthouse-ci:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Lighthouse CI
        run: bun add -g @lhci/cli

      - name: Build application
        run: bun run build
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'file:./dev.db' }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 'test-key' }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID || 'test-audience' }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL || 'test@example.com' }}
          API_SECRET_KEY: ${{ secrets.API_SECRET_KEY || 'test-secret' }}

      - name: Run Lighthouse CI
        run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  accessibility-tests:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Build application
        run: bun run build
        env:
          NODE_ENV: production
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'file:./dev.db' }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 'test-key' }}
          RESEND_AUDIENCE_ID: ${{ secrets.RESEND_AUDIENCE_ID || 'test-audience' }}
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL || 'test@example.com' }}
          API_SECRET_KEY: ${{ secrets.API_SECRET_KEY || 'test-secret' }}

      - name: Run accessibility tests
        run: bun run test:e2e --grep "accessibility"
        env:
          CI: true
