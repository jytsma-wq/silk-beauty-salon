name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # Job 1: Build and push Docker image
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.meta.outputs.tags }}
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'

  # Job 2: Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-image]
    environment:
      name: staging
      url: https://staging.silkbeautysalon.com
    if: github.ref == 'refs/heads/main' || inputs.environment == 'staging'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_KEY }}

      - name: Deploy to staging server
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.STAGING_USER }}@${{ secrets.STAGING_HOST }} << 'EOF'
            cd /opt/silk-beauty-salon
            
            # Pull latest image
            docker pull ${{ needs.build-image.outputs.image_tag }}
            
            # Run database migrations
            docker-compose run --rm app npx prisma migrate deploy
            
            # Update docker-compose with new image
            sed -i "s|image: .*|image: ${{ needs.build-image.outputs.image_tag }}|" docker-compose.yml
            
            # Restart services
            docker-compose up -d --no-deps app
            
            # Run health check
            sleep 10
            curl -f http://localhost:3000/api/health || exit 1
            
            # Cleanup old images
            docker image prune -f
          EOF

      - name: Run smoke tests
        run: |
          sleep 30
          curl -f https://staging.silkbeautysalon.com/api/health
          curl -f https://staging.silkbeautysalon.com

      - name: Notify Slack - Success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "✅ Staging deployment successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Staging Deployment*\n✅ Successful\n*Commit:* ${{ github.sha }}\n*Branch:* ${{ github.ref_name }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack - Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "❌ Staging deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Staging Deployment*\n❌ Failed\n*Commit:* ${{ github.sha }}\n*Branch:* ${{ github.ref_name }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Job 3: Production Approval
  production-approval:
    name: Production Approval
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment:
      name: production
      url: https://silkbeautysalon.com
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Wait for manual approval
        run: |
          echo "Waiting for manual approval to deploy to production..."
          echo "This job requires approval from a code owner."

  # Job 4: Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [production-approval, build-image]
    environment:
      name: production
      url: https://silkbeautysalon.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.PRODUCTION_SSH_KEY }}

      - name: Deploy to production (Blue-Green)
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.PRODUCTION_USER }}@${{ secrets.PRODUCTION_HOST }} << 'EOF'
            set -e
            
            # Determine active and inactive environments
            if docker-compose -f docker-compose.yml -f docker-compose.prod.yml ps | grep -q "app_blue"; then
              ACTIVE="blue"
              INACTIVE="green"
            else
              ACTIVE="green"
              INACTIVE="blue"
            fi
            
            echo "Active: $ACTIVE, Deploying to: $INACTIVE"
            
            # Pull latest image
            docker pull ${{ needs.build-image.outputs.image_tag }}
            
            # Update inactive environment
            export APP_SERVICE="app_$INACTIVE"
            export IMAGE_TAG="${{ needs.build-image.outputs.image_tag }}"
            docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d $APP_SERVICE
            
            # Run migrations on inactive environment
            docker-compose -f docker-compose.yml -f docker-compose.prod.yml run --rm \
              -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
              $APP_SERVICE npx prisma migrate deploy
            
            # Health check on inactive environment
            sleep 10
            INACTIVE_PORT=$([ "$INACTIVE" = "blue" ] && echo "3001" || echo "3002")
            curl -f http://localhost:$INACTIVE_PORT/api/health || exit 1
            
            # Switch load balancer to new environment
            sudo systemctl reload nginx
            
            # Stop old environment
            OLD_APP_SERVICE="app_$ACTIVE"
            docker-compose -f docker-compose.yml -f docker-compose.prod.yml stop $OLD_APP_SERVICE || true
            
            echo "Deployment complete. $INACTIVE is now active."
          EOF

      - name: Run production smoke tests
        run: |
          sleep 30
          curl -f https://silkbeautysalon.com/api/health
          curl -f https://silkbeautysalon.com

      - name: Notify Slack - Production Success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "🚀 Production deployment successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Deployment*\n🚀 Successful\n*Commit:* ${{ github.sha }}\n*Version:* ${{ needs.build-image.outputs.image_tag }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack - Production Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "🚨 Production deployment failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Deployment*\n🚨 Failed\n*Commit:* ${{ github.sha }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Logs>\n<${{ github.server_url }}/${{ github.repository }}/issues/new|Create Issue>"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # Job 5: Create Release
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: conventional-changelog/conventional-changelog-action@v4
        with:
          output-file: 'CHANGELOG.md'
          skip-version-file: 'true'
          skip-commit: 'true'

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.run_number }}
          release_name: Release ${{ github.run_number }}
          body: ${{ steps.changelog.outputs.clean_changelog }}
          draft: false
          prerelease: false
