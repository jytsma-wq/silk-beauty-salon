<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9a87c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="200" fill="#d4a574" opacity="0.05"/>
  <circle cx="1100" cy="530" r="250" fill="#d4a574" opacity="0.05"/>
  
  <!-- Main text -->
  <text x="600" y="280" font-family="Georgia, serif" font-size="72" fill="#ffffff" text-anchor="middle" font-weight="bold">Silk Beauty Salon</text>
  
  <!-- Accent line -->
  <rect x="400" y="310" width="400" height="3" fill="url(#accent)"/>
  
  <!-- Subtitle -->
  <text x="600" y="370" font-family="Arial, sans-serif" font-size="28" fill="#d4a574" text-anchor="middle">Premier Medical Aesthetics</text>
  
  <!-- Location -->
  <text x="600" y="420" font-family="Arial, sans-serif" font-size="22" fill="#888888" text-anchor="middle">Batumi, Georgia</text>
  
  <!-- Services -->
  <text x="600" y="480" font-family="Arial, sans-serif" font-size="18" fill="#666666" text-anchor="middle">Botox • Dermal Fillers • Laser Treatments • Advanced Skin Care</text>
  
  <!-- Bottom accent -->
  <rect x="0" y="600" width="1200" height="30" fill="url(#accent)"/>
</svg>
