<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Non-intersecting diagonal pattern -->
  <!-- \ lines on left side of each cell -->
  <line x1="10" y1="0" x2="50" y2="40" stroke="#000" stroke-width="2" opacity="0.1"/>
  <line x1="60" y1="0" x2="100" y2="40" stroke="#000" stroke-width="2" opacity="0.1"/>
  <line x1="110" y1="0" x2="150" y2="40" stroke="#000" stroke-width="2" opacity="0.1"/>
  <line x1="160" y1="0" x2="200" y2="40" stroke="#000" stroke-width="2" opacity="0.1"/>
  
  <line x1="10" y1="50" x2="50" y2="90" stroke="#000" stroke-width="2" opacity="0.1"/>
  <line x1="60" y1="50" x2="100" y2="90" stroke="#000" stroke-width="2" opacity="0.1"/>
  <line x1="110" y1="50" x2="150" y2="90" stroke="#000" stroke-width="2" opacity="0.1"/>
  <line x1="160" y1="50" x2="200" y2="90" stroke="#000" stroke-width="2" opacity="0.1"/>
  
  <line x1="10" y1="100" x2="50" y2="140" stroke="#000" stroke-width="2" opacity="0.1"/>
  <line x1="60" y1="100" x2="100" y2="140" stroke="#000" stroke-width="2" opacity="0.1"/>
  <line x1="110" y1="100" x2="150" y2="140" stroke="#000" stroke-width="2" opacity="0.1"/>
  <line x1="160" y1="100" x2="200" y2="140" stroke="#000" stroke-width="2" opacity="0.1"/>
  
  <line x1="10" y1="150" x2="50" y2="190" stroke="#000" stroke-width="2" opacity="0.1"/>
  <line x1="60" y1="150" x2="100" y2="190" stroke="#000" stroke-width="2" opacity="0.1"/>
  <line x1="110" y1="150" x2="150" y2="190" stroke="#000" stroke-width="2" opacity="0.1"/>
  <line x1="160" y1="150" x2="200" y2="190" stroke="#000" stroke-width="2" opacity="0.1"/>
  
  <!-- / lines on right side of each cell -->
  <line x1="50" y1="10" x2="10" y2="50" stroke="#000" stroke-width="2" opacity="0.1"/>
  <line x1="100" y1="10" x2="60" y2="50" stroke="#000" stroke-width="2" opacity="0.1"/>
  <line x1="150" y1="10" x2="110" y2="50" stroke="#000" stroke-width="2" opacity="0.1"/>
  
  <line x1="50" y1="60" x2="10" y2="100" stroke="#000" stroke-width="2" opacity="0.1"/>
  <line x1="100" y1="60" x2="60" y2="100" stroke="#000" stroke-width="2" opacity="0.1"/>
  <line x1="150" y1="60" x2="110" y2="100" stroke="#000" stroke-width="2" opacity="0.1"/>
  
  <line x1="50" y1="110" x2="10" y2="150" stroke="#000" stroke-width="2" opacity="0.1"/>
  <line x1="100" y1="110" x2="60" y2="150" stroke="#000" stroke-width="2" opacity="0.1"/>
  <line x1="150" y1="110" x2="110" y2="150" stroke="#000" stroke-width="2" opacity="0.1"/>
  
  <line x1="50" y1="160" x2="10" y2="200" stroke="#000" stroke-width="2" opacity="0.1"/>
  <line x1="100" y1="160" x2="60" y2="200" stroke="#000" stroke-width="2" opacity="0.1"/>
  <line x1="150" y1="160" x2="110" y2="200" stroke="#000" stroke-width="2" opacity="0.1"/>
</svg>
