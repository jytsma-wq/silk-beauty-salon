<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <pattern id="lattice" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <!-- Diagonal lines forming diamond grid -->
      <line x1="0" y1="50" x2="50" y2="0" stroke="#000" stroke-width="0.5" opacity="0.15"/>
      <line x1="0" y1="0" x2="50" y2="50" stroke="#000" stroke-width="0.5" opacity="0.15"/>
      <!-- Vertical lines at intersections -->
      <line x1="25" y1="0" x2="25" y2="50" stroke="#000" stroke-width="0.3" opacity="0.1"/>
      <!-- Horizontal lines at intersections -->
      <line x1="0" y1="25" x2="50" y2="25" stroke="#000" stroke-width="0.3" opacity="0.1"/>
    </pattern>
  </defs>
  <rect width="100" height="100" fill="url(#lattice)"/>
</svg>
